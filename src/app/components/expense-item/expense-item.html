<div
  class="card h-100 shadow-sm"
  [class.border-danger]="isHighExpense()"
  [style.border-width]="isHighExpense() ? '2px' : '1px'"
>
  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title mb-0 fw-semibold">{{ expense().title }}</h5>
      <span class="badge {{ categoryBadgeClass() }} ms-2">
        {{ expense().category }}
      </span>
    </div>

    <p
      class="fs-5 fw-bold"
      [class.text-danger]="isHighExpense()"
      [class.text-success]="!isHighExpense()"
    >
      {{ expense().amount | currency }}
    </p>

    @if (isHighExpense()) {
      <p class="text-danger small mb-2"><i class="bi bi-exclamation-triangle-fill"></i> High expense</p>
    }

    <div class="mt-auto d-flex gap-2">
      <button
        class="btn btn-outline-danger btn-sm"
        (click)="onDelete()"
        title="Delete"
      >
        <i class="bi bi-trash"></i> Delete
      </button>
      <a
        [routerLink]="['/edit', expense().id]"
        class="btn btn-outline-secondary btn-sm"
        title="Edit"
      >
        <i class="bi bi-pencil"></i> Edit
      </a>
    </div>
  </div>
</div>
