<div class="container py-4" style="max-width: 540px;">
  <h2 class="mb-4 fw-bold text-secondary">
    <i class="bi bi-pencil-square"></i> Edit Expense
  </h2>

  @if (notFound()) {
    <div class="alert alert-danger">
      Expense not found. <a routerLink="/expenses">Go back</a>
    </div>
  } @else {
    <div class="card shadow-sm">
      <div class="card-body">
        <form (ngSubmit)="onSubmit()" novalidate>

          <!-- Title -->
          <div class="mb-3">
            <label for="edit-title" class="form-label fw-semibold">Title</label>
            <input
              id="edit-title"
              type="text"
              class="form-control"
              [class.is-invalid]="submitted() && !title().trim()"
              [(ngModel)]="titleValue"
              name="title"
              placeholder="e.g. Grocery Run"
            />
            @if (submitted() && !title().trim()) {
              <div class="invalid-feedback">Title is required.</div>
            }
          </div>

          <!-- Amount -->
          <div class="mb-3">
            <label for="edit-amount" class="form-label fw-semibold">Amount ($)</label>
            <input
              id="edit-amount"
              type="number"
              class="form-control"
              [class.is-invalid]="submitted() && (!amount() || amount()! <= 0)"
              [(ngModel)]="amountValue"
              name="amount"
              min="0.01"
              step="0.01"
            />
            @if (submitted() && (!amount() || amount()! <= 0)) {
              <div class="invalid-feedback">Enter a valid positive amount.</div>
            }
          </div>

          <!-- Category -->
          <div class="mb-4">
            <label for="edit-category" class="form-label fw-semibold">Category</label>
            <select
              id="edit-category"
              class="form-select"
              [(ngModel)]="categoryValue"
              name="category"
            >
              @for (cat of service.categories(); track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-secondary">
              <i class="bi bi-save"></i> Update
            </button>
            <a routerLink="/expenses" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  }
</div>
